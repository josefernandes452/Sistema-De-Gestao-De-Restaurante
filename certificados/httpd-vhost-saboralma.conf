# Bloco a adicionar em C:\xampp\apache\conf\extra\httpd-ssl.conf
# (depois do ultimo </VirtualHost> que ja existir nesse ficheiro).
#
# Serve para a area administrativa do Sabor Alma (/views/admin/)
# exigir, alem da password normal, um certificado digital instalado
# no browser. O site publico (cardapio, pedidos do cliente) continua
# a funcionar so com password, sem certificado nenhum.
#
# Antes de ativar isto:
# 1) Criar uma junction para o projeto dentro do htdocs, para evitar
#    problemas do Apache com os caracteres especiais do caminho do
#    OneDrive (executar como Administrador, no PowerShell):
#
#    New-Item -ItemType Junction -Path "C:\xampp\htdocs\saboralma" -Target "CAMINHO_COMPLETO_DO_PROJETO"
#
# 2) Copiar para C:\xampp\apache\conf\ssl\:
#      - ca.crt (fica em certificados/ca.crt deste projeto)
#      - saboralma-servidor.crt e saboralma-servidor.key (pedir ao Jose,
#        ou gerar de novo assinado pela mesma CA)
#
# 3) Adicionar ao ficheiro hosts do Windows (precisa de admin):
#    C:\Windows\System32\drivers\etc\hosts
#
#    127.0.0.1 saboralma.local
#
# 4) Colar o bloco abaixo no httpd-ssl.conf e reiniciar o Apache.

<VirtualHost *:443>

DocumentRoot "C:/xampp/htdocs/saboralma"
ServerName saboralma.local
ServerAdmin admin@saboralma.ao
ErrorLog "C:/xampp/apache/logs/saboralma-error.log"
TransferLog "C:/xampp/apache/logs/saboralma-access.log"

SSLEngine on
SSLCertificateFile "C:/xampp/apache/conf/ssl/saboralma-servidor.crt"
SSLCertificateKeyFile "C:/xampp/apache/conf/ssl/saboralma-servidor.key"
SSLCACertificateFile "C:/xampp/apache/conf/ssl/ca.crt"

# TLS 1.3 pede o certificado do cliente de outra forma ("post-handshake
# auth"), que nem todos os clientes suportam bem quando o certificado
# so e exigido numa pasta (nao no site todo). Preso a TLS 1.2 aqui,
# que faz isto atraves de uma renegociacao classica, mais fiavel.
SSLProtocol -all +TLSv1.2

# "optional" aqui em cima: o site publico nao obriga a certificado.
# Dentro de /views/admin/ e que fica "require" (ver mais abaixo).
SSLVerifyClient optional
SSLVerifyDepth 2
SSLOptions +StdEnvVars

<Directory "C:/xampp/htdocs/saboralma">
    Options Indexes FollowSymLinks
    AllowOverride All
    Require all granted
</Directory>

<Directory "C:/xampp/htdocs/saboralma/views/admin">
    SSLVerifyClient require
    SSLVerifyDepth 2
    SSLOptions +StdEnvVars
</Directory>

<FilesMatch "\.php$">
    SSLOptions +StdEnvVars
</FilesMatch>

CustomLog "C:/xampp/apache/logs/saboralma_ssl_request.log" \
          "%t %h %{SSL_PROTOCOL}x %{SSL_CIPHER}x \"%r\" %b"

</VirtualHost>
